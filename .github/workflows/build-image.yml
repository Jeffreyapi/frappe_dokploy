name: Build & push image

# =============================================================================
#  Workflow réutilisable (workflow_call) — appelé par chaque repo app.
#
#  Usage dans le repo app (.github/workflows/publish.yml) :
#
#    jobs:
#      build:
#        uses: Jeffreyapi/frappe_dokploy/.github/workflows/build-image.yml@main
#        with:
#          image-name: ghcr.io/jeffreyapi/mon_app
#        secrets: inherit
# =============================================================================

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image complète (ex: ghcr.io/jeffreyapi/mon_app)"
        required: true
        type: string
      frappe-version:
        description: "Branche Frappe (ex: version-16)"
        required: false
        type: string
        default: "version-16"
      python-version:
        description: "Version Python (ex: python3.14)"
        required: false
        type: string
        default: "python3.14"
    secrets:
      GH_PAT:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (avec submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Déterminer le tag Docker
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Encoder apps.json
        id: apps
        run: |
          export GH_PAT="${{ secrets.GH_PAT }}"
          envsubst < apps.json > /tmp/apps.build.json
          echo "b64=$(base64 -w 0 /tmp/apps.build.json)" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: frappe_deploy
          file: frappe_deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FRAPPE_VERSION=${{ inputs.frappe-version }}
            APPS_JSON_BASE64=${{ steps.apps.outputs.b64 }}
          tags: |
            ${{ inputs.image-name }}:${{ steps.tag.outputs.version }}
            ${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
