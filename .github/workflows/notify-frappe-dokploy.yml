# =============================================================================
#  notify-frappe-dokploy.yml
#  Template à copier dans chaque repo d'application Frappe.
#  Emplacement : .github/workflows/notify-frappe-dokploy.yml
#
#  Ce workflow notifie frappe_dokploy qu'une nouvelle version est disponible,
#  ce qui déclenche automatiquement le build de la nouvelle image Docker.
#
#  Prérequis :
#    - Créer un secret FRAPPE_DOKPLOY_PAT dans ce repo
#      (token GitHub avec scope repo sur Jeffreyapi/frappe_dokploy)
#    - Remplacer APP_NAME par le nom de votre application
# =============================================================================

name: Notify frappe_dokploy (trigger image build)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

  # Déclenchement manuel si besoin
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Déclencher le build de l'image dans frappe_dokploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FRAPPE_DOKPLOY_PAT }}
          repository: Jeffreyapi/frappe_dokploy
          event-type: app-updated
          client-payload: |
            {
              "app": "pharmtek_crm",
              "branch": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
