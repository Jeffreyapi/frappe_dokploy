name: Build & publish image Frappe

on:
  # Déclenché par un tag git (ex: v1.2.3 ou pharmtek-v1.2.3)
  push:
    tags:
      - 'v*'
      - '*-v*'

  # Déclenché depuis un repo d'application via repository_dispatch
  repository_dispatch:
    types: [app-updated]

  # Déclenchement manuel avec choix du tag
  workflow_dispatch:
    inputs:
      version:
        description: "Tag Docker (ex: v1.0.0)"
        required: true
      frappe_version:
        description: "Branche Frappe (ex: version-15)"
        required: false
        default: "version-15"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_REG: ghcr.io/jeffreyapi
      IMAGE_NAME: frappe
      FRAPPE_VERSION: ${{ github.event.inputs.frappe_version || 'version-15' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Déterminer le tag de l'image ──────────────────────────────────────
      - name: Déterminer le tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            APP="${{ github.event.client_payload.app }}"
            SHA="${{ github.event.client_payload.sha }}"
            BRANCH="${{ github.event.client_payload.branch }}"
            # Tag : <app>-<branch>-<sha_court> ex: pharmtek_crm-main-a1b2c3d
            echo "version=${APP}-${BRANCH}-${SHA:0:7}" >> $GITHUB_OUTPUT
          else
            # push tag git : on utilise le tag directement
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      # ── Préparer apps.json avec le PAT ────────────────────────────────────
      - name: Préparer apps.json
        run: |
          export GH_PAT="${{ secrets.GH_PAT }}"
          envsubst < apps.json > apps.build.json
          echo "apps.build.json généré"

      - name: Encoder apps.json en base64
        id: encode
        run: |
          echo "APPS_JSON_BASE64=$(base64 -w 0 apps.build.json)" >> $GITHUB_ENV

      # ── Login GHCR ───────────────────────────────────────────────────────
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # ── Build multi-plateforme ────────────────────────────────────────────
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FRAPPE_VERSION=${{ env.FRAPPE_VERSION }}
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
          tags: |
            ${{ env.IMAGE_REG }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_REG }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/Jeffreyapi/frappe_dokploy
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}

      # ── Résumé du build ──────────────────────────────────────────────────
      - name: Résumé
        run: |
          echo "## Image publiée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image** : \`${{ env.IMAGE_REG }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frappe** : \`${{ env.FRAPPE_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "**Déclencheur** : app \`${{ github.event.client_payload.app }}\` — branch \`${{ github.event.client_payload.branch }}\`" >> $GITHUB_STEP_SUMMARY
          fi
