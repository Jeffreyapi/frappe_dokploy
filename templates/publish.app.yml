# =============================================================================
#  Template : .github/workflows/publish.yml — à placer dans le repo APP.
#
#  Ce workflow construit et pousse l'image Docker spécifique à ce projet.
#  L'image est construite depuis le submodule frappe_deploy/ (Dockerfile + resources)
#  et les apps définies dans apps.json à la racine du repo.
#
#  Instructions :
#    1. Copier ce fichier en .github/workflows/publish.yml dans le repo app
#    2. Remplacer MY_APP par le nom de l'application (ex: pharmtek, talents30)
#    3. Adapter les branches de déclenchement si nécessaire
#    4. Ajouter le secret GH_PAT dans les settings GitHub du repo
#
#  Secret GitHub requis :
#    GH_PAT : token avec scopes repo + write:packages
# =============================================================================

name: Build & publish image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: "Tag Docker (ex: v1.0.0)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Adapter : nom de l'image spécifique à ce projet
      IMAGE_NAME: ghcr.io/jeffreyapi/MY_APP
      FRAPPE_VERSION: version-15

    steps:
      - name: Checkout (avec submodules)
        uses: actions/checkout@v4
        with:
          # Indispensable : clone également frappe_deploy/ (le submodule)
          submodules: recursive

      # ── Déterminer le tag de l'image ──────────────────────────────────────
      - name: Déterminer le tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Push d'un tag git : v1.2.3 → tag Docker v1.2.3
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            # Push de branche : main → main-abc1234
            echo "version=${GITHUB_REF_NAME}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      # ── Préparer apps.json avec le PAT ────────────────────────────────────
      # envsubst remplace ${GH_PAT} dans apps.json par le vrai token,
      # puis le fichier est encodé en base64 pour être passé au Dockerfile.
      - name: Encoder apps.json
        id: encode
        run: |
          export GH_PAT="${{ secrets.GH_PAT }}"
          envsubst < apps.json > /tmp/apps.build.json
          echo "apps_json_base64=$(base64 -w 0 /tmp/apps.build.json)" >> $GITHUB_OUTPUT

      # ── Calculer les tags Docker ───────────────────────────────────────────
      - name: Calculer les tags Docker
        id: tags
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          {
            echo "value<<__TAGS__"
            echo "${{ env.IMAGE_NAME }}:${VERSION}"
            echo "${{ env.IMAGE_NAME }}:latest"
            echo "__TAGS__"
          } >> $GITHUB_OUTPUT

      # ── Login GHCR ────────────────────────────────────────────────────────
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # ── Build multi-plateforme ─────────────────────────────────────────────
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          # context = le submodule (contient Dockerfile + resources/)
          # apps.json n'est pas copié dans l'image : il est passé via build-arg
          context: frappe_deploy
          file: frappe_deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FRAPPE_VERSION=${{ env.FRAPPE_VERSION }}
            APPS_JSON_BASE64=${{ steps.encode.outputs.apps_json_base64 }}
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}

      # ── Résumé du build ────────────────────────────────────────────────────
      - name: Résumé
        run: |
          echo "## Image publiée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image** : \`${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frappe** : \`${{ env.FRAPPE_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Déclencheur** : \`${{ github.event_name }}\` sur \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
