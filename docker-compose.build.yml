# =============================================================================
#  docker-compose.build.yml — override build local
#
#  Usage :
#    docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d
#
#  Ce fichier surcharge `image:` + `pull_policy:` et ajoute `build:` sur chaque
#  service Frappe. Docker Compose fusionne les services (pas les anchors YAML
#  entre fichiers), donc chaque service est redéfini explicitement.
#
#  Variables :
#    GH_PAT          : token GitHub pour cloner les apps privées
#    FRAPPE_VERSION  : branche Frappe à utiliser (défaut: version-15)
#    APPS_JSON_BASE64: apps.json encodé en base64 (généré par envsubst + base64)
# =============================================================================

# Anchor interne pour les args de build (résolu dans ce fichier uniquement)
x-local-build: &local_build
  context: .
  dockerfile: Dockerfile
  args:
    FRAPPE_VERSION:   ${FRAPPE_VERSION:-version-15}
    APPS_JSON_BASE64: ${APPS_JSON_BASE64:-}

services:
  site-manager:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  backend:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  frontend:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  websocket:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  queue-default:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  queue-long:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  queue-short:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build

  scheduler:
    build: *local_build
    image: frappe-local:dev
    pull_policy: build
